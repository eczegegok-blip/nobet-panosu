<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niksar Dijital Pano - V34</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        html, body {
            background: #1a0505 !important;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            color: white; font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #viewport {
            width: 1080px; height: 1920px;
            display: flex; flex-direction: column;
            position: relative;
            transform-origin: center center;
            box-sizing: border-box;
            padding: 20px 40px 100px 40px; /* Alt padding 100px yapıldı (GÜVENLİ ALAN) */
        }

        #video-container {
            position: fixed; inset: 0; z-index: 10000;
            background: black; display: none;
        }
        .ad-video {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }
        .ad-video.active { opacity: 1; z-index: 10; }

        .urgent-flash {
            animation: flash-red 1s infinite;
            box-shadow: 0 0 80px rgba(227, 6, 19, 0.6);
        }
        @keyframes flash-red {
            0%, 100% { background-color: #E30613; transform: scale(1); }
            50% { background-color: #b91c1c; transform: scale(1.01); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
        }

        #setup-layer {
            position: absolute; inset: 0; z-index: 20000;
            background: #1a0505; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        iframe { 
            border-radius: 40px; 
            border: 4px solid rgba(255,255,255,0.05); 
            background: #000;
            filter: grayscale(1) invert(0.95) contrast(1.1) brightness(0.9);
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video1" class="ad-video" muted playsinline preload="auto"></video>
        <video id="video2" class="ad-video" muted playsinline preload="auto"></video>
        <div class="absolute bottom-10 right-10 bg-black/60 px-8 py-3 rounded-full text-xl font-bold uppercase tracking-widest text-white/70 border border-white/10 z-[100]">Tanıtım Yayını</div>
    </div>

    <div id="viewport">
        <!-- SETUP -->
        <div id="setup-layer">
            <div class="bg-red-600 w-40 h-40 rounded-[40px] flex items-center justify-center mb-10 shadow-2xl">
                <svg width="80" height="80" viewBox="0 0 100 100"><path d="M30 25H75V38H43V44H70V56H43V62H75V75H30V25Z" fill="white"/></svg>
            </div>
            <h2 class="text-6xl font-black uppercase mb-6 tracking-tighter">SİSTEM HAZIR</h2>
            <p class="text-3xl text-slate-400">Sol alta 5 kez bas.</p>
        </div>

        <!-- MAIN -->
        <div id="main-content" class="flex-1 flex flex-col w-full h-full opacity-0 transition-opacity duration-700">
            <!-- HEADER DAHA KOMPAKT -->
            <header class="flex flex-col items-center space-y-2 mb-6">
                <div class="flex items-center gap-6 text-white">
                    <div class="bg-white w-14 h-14 rounded-xl flex items-center justify-center">
                        <svg width="30" height="30" viewBox="0 0 100 100"><path d="M30 25H75V38H43V44H70V56H43V62H75V75H30V25Z" fill="#E30613"/></svg>
                    </div>
                    <h1 class="text-3xl font-black italic uppercase opacity-60">NİKSAR NÖBETÇİ ECZANE</h1>
                </div>
                <!-- SAAT BİRAZ KÜÇÜLTÜLDÜ (YER AÇMAK İÇİN) -->
                <div id="clock" class="text-[13rem] font-black leading-none tabular-nums tracking-tighter text-white drop-shadow-2xl">00:00:00</div>
                <div id="date-text" class="text-3xl font-bold text-red-200/40 uppercase tracking-[0.3em]">-- --- ----</div>
            </header>

            <main id="info-layer" class="flex-1 flex flex-col space-y-6 overflow-hidden">
                <!-- NÖBETÇİ KARTI DAHA DERLİ TOPLU -->
                <div class="glass-card p-10 flex flex-col items-center text-center space-y-6 shadow-2xl">
                    <div id="status-badge" class="urgent-flash px-16 py-4 rounded-full text-5xl font-black uppercase text-white">ŞU AN NÖBETÇİ</div>
                    <h2 id="ph-name" class="text-[9.5rem] font-black uppercase tracking-tighter leading-[0.85] py-2 text-white drop-shadow-xl">--</h2>
                    <div class="w-full h-0.5 bg-white/10 rounded-full"></div>
                    <div class="flex items-center gap-6">
                        <svg class="w-14 h-14 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                        <p id="ph-phone" class="text-7xl font-black text-green-400 tracking-tighter">--</p>
                    </div>
                    <p id="ph-address" class="text-4xl text-red-100/70 font-bold leading-tight max-w-4xl italic">--</p>
                </div>

                <!-- HARİTA -->
                <div class="flex-1 relative min-h-[400px]">
                    <iframe id="map-iframe" width="100%" height="100%" frameborder="0"></iframe>
                </div>

                <!-- ALT BAR - DAHA YUKARIDA VE GÜVENLİ -->
                <div class="flex justify-between items-center bg-white p-8 rounded-[50px] shadow-2xl border-b-[15px] border-red-900/10">
                    <div class="flex items-center gap-8">
                        <img id="qr-code" src="" class="w-36 h-36" alt="QR">
                        <div class="text-slate-900">
                            <p class="font-black text-5xl leading-none uppercase italic tracking-tighter">NAVİGASYON</p>
                            <p class="font-bold text-lg opacity-40 uppercase mt-2">Kameranla Tara</p>
                        </div>
                    </div>
                    <div class="text-right text-slate-400 font-bold pr-4">
                        <p class="text-slate-900 text-2xl font-black">H.İçi: 18:00 - 08:00</p>
                        <p class="text-slate-900 text-2xl font-black uppercase">H.Sonu: 24 SAAT</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- SECRET TRIGGER -->
    <div onclick="handleSecretClick()" style="position:fixed; bottom:0; left:0; width:450px; height:450px; z-index:30000; cursor:pointer;"></div>

    <!-- PIN OVERLAY -->
    <div id="pin-overlay" class="fixed inset-0 bg-[#1a0505]/98 z-[40000] hidden flex items-center justify-center">
        <div class="max-w-2xl w-full text-center p-16 space-y-12 glass-card">
            <h3 class="text-7xl font-black uppercase tracking-widest text-red-600">GİRİŞ</h3>
            <input type="password" id="custom-pin-input" maxlength="4" class="w-full bg-red-950/50 border-8 border-red-900 rounded-[50px] p-10 text-center text-[10rem] font-black text-white outline-none" placeholder="****">
            <div class="grid grid-cols-2 gap-6">
                <button onclick="verifyPin()" class="bg-white text-red-900 py-10 rounded-[50px] font-black text-5xl uppercase shadow-2xl">ONAY</button>
                <button onclick="closePinOverlay()" class="bg-red-900/20 text-white rounded-[50px] font-black text-3xl uppercase">İPTAL</button>
            </div>
        </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-modal" class="fixed inset-0 bg-[#1a0505]/98 z-[50000] hidden p-20 overflow-y-auto text-left">
        <div class="max-w-5xl mx-auto space-y-12 text-white">
            <h3 class="text-6xl font-black uppercase italic border-b border-red-900 pb-6 text-red-600">Pano Yönetimi (V34)</h3>
            <div class="space-y-4">
                <label class="text-3xl font-black text-red-500 uppercase tracking-widest">1. Reklam Videoları</label>
                <textarea id="video-input" class="w-full h-40 bg-black/50 border-4 border-red-900 rounded-[40px] p-10 font-mono text-2xl text-green-400 outline-none" placeholder="Dropbox linkleri (Sona ?dl=1 ekleyin)"></textarea>
            </div>
            <div class="space-y-4">
                <label class="text-3xl font-black text-red-200/50 uppercase tracking-widest">2. Nöbet Listesi</label>
                <textarea id="list-input" oninput="checkParseStatus()" class="w-full h-80 bg-red-950/30 border-4 border-red-900 rounded-[50px] p-12 font-mono text-3xl text-blue-300 outline-none"></textarea>
                <div id="parse-status" class="text-3xl font-black mt-4">--</div>
            </div>
            <button onclick="saveAndApply()" class="w-full bg-red-600 text-white py-12 rounded-[60px] font-black text-7xl uppercase shadow-2xl">DEĞİŞİKLİKLERİ KAYDET</button>
        </div>
    </div>

    <script>
        let dutyRoster = [], videoList = [], currentVideoIndex = 0, clickCounter = 0, lastClickTime = 0;
        let watchdogTimer = null;
        const systemPin = "5260";

        // GÜVENLİ ÖLÇEKLENDİRME: %5 GÜVENLİK MARJI EKLENDİ
        function scaleToFit() {
            const viewport = document.getElementById('viewport');
            const scaleX = window.innerWidth / 1080;
            const scaleY = window.innerHeight / 1920;
            // 0.95 çarpanı ile içeriği biraz daha küçültüp altta bariz bir boşluk bırakıyoruz
            const scale = Math.min(scaleX, scaleY) * 0.95; 
            viewport.style.transform = `scale(${scale})`;
        }

        function unicodeGuard(text) {
            if (!text) return "";
            return text.normalize('NFC').replace(/\u00A0/g, ' ').replace(/[^\x20-\x7E\sİıĞğÜüŞşÖöÇç<>|.]/g, '');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('tr-TR', { hour12: false });
            document.getElementById('date-text').textContent = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', weekday: 'long' });
            if (now.getSeconds() === 0) checkMode();
        }

        function handleSecretClick() {
            const n = Date.now();
            if (n - lastClickTime > 2000) clickCounter = 0;
            clickCounter++;
            lastClickTime = n;
            if (clickCounter >= 5) { document.getElementById('pin-overlay').classList.remove('hidden'); document.getElementById('custom-pin-input').focus(); clickCounter = 0; }
        }

        function verifyPin() {
            if (document.getElementById('custom-pin-input').value === systemPin) {
                document.getElementById('pin-overlay').classList.add('hidden');
                document.getElementById('settings-modal').classList.remove('hidden');
                document.getElementById('custom-pin-input').value = "";
                checkParseStatus();
            } else { alert("ŞİFRE HATALI!"); document.getElementById('custom-pin-input').value = ""; }
        }

        function closePinOverlay() { document.getElementById('pin-overlay').classList.add('hidden'); }

        function checkParseStatus() {
            const raw = document.getElementById('list-input').value;
            const text = unicodeGuard(raw);
            const rOda = /<([^>]+)>\s*<([^>]+)>\s*<([^>]+)>/g;
            const matches = text.match(rOda) || [];
            const s = document.getElementById('parse-status');
            s.textContent = matches.length > 0 ? `${matches.length} KAYIT ALGILANDI ✓` : "FORMAT HATALI X";
            s.style.color = matches.length > 0 ? "#22c55e" : "#ef4444";
        }

        function process(lt, vt) {
            dutyRoster = [];
            const text = unicodeGuard(lt);
            const rOda = /<([^>]+)>\s*<([^>]+)>\s*<([^>]+)>/g;
            let m;
            while ((m = rOda.exec(text)) !== null) {
                const info = m[2].trim().split(' . ');
                dutyRoster.push({ isim: m[1].trim(), adres: info[0], tel: info[1] || "", tarih: m[3].trim() });
            }
            videoList = vt.split('\n').map(x => x.trim()).filter(x => x.startsWith('http'));
        }

        function saveAndApply() {
            localStorage.setItem('n_v34_list', document.getElementById('list-input').value);
            localStorage.setItem('n_v34_video', document.getElementById('video-input').value);
            process(document.getElementById('list-input').value, document.getElementById('video-input').value);
            checkMode();
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function checkMode() {
            const now = new Date();
            const hour = now.getHours();
            const day = now.getDay();
            const isWeekend = (day === 0 || day === 6);
            const isAdTime = !isWeekend && (hour >= 8 && hour < 18);
            
            const setup = document.getElementById('setup-layer');
            const mainContent = document.getElementById('main-content');
            const videoContainer = document.getElementById('video-container');

            if (dutyRoster.length === 0) { setup.style.display = 'flex'; mainContent.style.opacity = '0'; return; }

            setup.style.display = 'none';
            mainContent.style.opacity = '1';

            if (isAdTime && videoList.length > 0) {
                videoContainer.style.display = 'block';
                const v1 = document.getElementById('video1');
                const v2 = document.getElementById('video2');
                if (v1.src === "" && v2.src === "") { startVideoEngine(); }
            } else {
                videoContainer.style.display = 'none';
                stopVideoEngine();
                
                let t = new Date(now);
                if (now.getHours() < 8) t.setDate(now.getDate() - 1);
                const target = `${String(t.getDate()).padStart(2,'0')}.${String(t.getMonth()+1).padStart(2,'0')}.${t.getFullYear()}`;
                let todayPh = dutyRoster.find(e => e.tarih === target) || dutyRoster[0];
                updateDisplay(todayPh);
            }
        }

        function startVideoEngine() {
            if (videoList.length === 0) return;
            const v1 = document.getElementById('video1');
            const v2 = document.getElementById('video2');
            resetWatchdog();
            v1.src = videoList[0];
            v1.classList.add('active');
            v1.play().catch(handleVideoError);
            if (videoList.length > 1) { v2.src = videoList[1]; }
            [v1, v2].forEach(v => {
                v.onended = () => { resetWatchdog(); swapVideos(v === v1 ? v1 : v2, v === v1 ? v2 : v1); };
                v.onerror = handleVideoError;
                v.onplay = resetWatchdog;
            });
        }

        function stopVideoEngine() {
            const v1 = document.getElementById('video1');
            const v2 = document.getElementById('video2');
            v1.pause(); v2.pause();
            v1.src = ""; v2.src = "";
            v1.classList.remove('active'); v2.classList.remove('active');
            if (watchdogTimer) clearTimeout(watchdogTimer);
        }

        function swapVideos(current, next) {
            currentVideoIndex = (currentVideoIndex + 1) % videoList.length;
            const nextIdx = (currentVideoIndex + 1) % videoList.length;
            current.classList.remove('active');
            next.classList.add('active');
            const playPromise = next.play();
            if (playPromise !== undefined) { playPromise.catch(handleVideoError); }
            setTimeout(() => {
                current.src = videoList[nextIdx];
                current.load();
            }, 1000);
        }

        function resetWatchdog() {
            if (watchdogTimer) clearTimeout(watchdogTimer);
            watchdogTimer = setTimeout(() => {
                const v1 = document.getElementById('video1');
                const v2 = document.getElementById('video2');
                if (v1.classList.contains('active')) swapVideos(v1, v2);
                else swapVideos(v2, v1);
            }, 15000);
        }

        function handleVideoError() {
            const v1 = document.getElementById('video1');
            const v2 = document.getElementById('video2');
            setTimeout(() => {
                if (v1.classList.contains('active')) swapVideos(v1, v2);
                else swapVideos(v2, v1);
            }, 2000);
        }

        function updateDisplay(ph) {
            document.getElementById('ph-name').textContent = ph.isim;
            document.getElementById('ph-address').textContent = ph.adres;
            document.getElementById('ph-phone').textContent = ph.tel;
            const q = encodeURIComponent(`${ph.isim} Eczanesi Niksar Tokat`);
            document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${q}&t=&z=16&ie=UTF8&iwloc=&output=embed`;
            const mapLink = `https://www.google.com/maps/search/?api=1&query=${q}`;
            document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=350x350&data=${encodeURIComponent(mapLink)}&color=020617`;
            const now = new Date();
            const isNöbetçi = (now.getDay() === 0 || now.getDay() === 6) || (now.getHours() >= 18 || now.getHours() < 8);
            document.getElementById('status-badge').textContent = isNöbetçi ? "ŞU AN NÖBETÇİ" : "GELECEK NÖBETÇİ";
        }

        window.onload = () => {
            scaleToFit(); window.addEventListener('resize', scaleToFit);
            const sl = localStorage.getItem('n_v34_list');
            const sv = localStorage.getItem('n_v34_video');
            if (sl) {
                document.getElementById('list-input').value = sl;
                document.getElementById('video-input').value = sv || "";
                process(sl, sv || "");
            }
            setInterval(updateClock, 1000); updateClock(); checkMode();
        };
    </script>
</body>
</html>
