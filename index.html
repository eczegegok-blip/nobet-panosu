<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niksar Dijital Pano - V10</title>
    <!-- BEYAZ EKRANI ENGELLEYEN ZORUNLU STİL -->
    <style>
        html, body {
            background-color: #020617 !important; /* Lacivert-Siyah */
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            color: white; font-family: sans-serif;
            overflow: hidden;
        }
        #main-container {
            width: 1080px; height: 1920px;
            display: flex; flex-direction: column;
            position: relative;
        }
        .setup-box {
            text-align: center; border: 2px solid rgba(255,255,255,0.1);
            padding: 50px; border-radius: 40px; background: rgba(255,255,255,0.02);
        }
        #video-container { position: absolute; inset: 0; z-index: 10; display: none; background: black; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #duty-layer { flex: 1; display: flex; flex-direction: column; opacity: 0; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <div id="main-container">
        <!-- KURULUM MESAJI -->
        <div id="setup-message" class="setup-box">
            <div class="bg-red-600 w-24 h-24 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
                <span class="text-5xl font-black">E</span>
            </div>
            <h2 class="text-4xl font-bold mb-4 uppercase">Sistem Hazır</h2>
            <p class="text-xl text-slate-400 mb-8">
                Tebrikler, beyaz ekranı aştınız.<br>
                Veri girişi için sol alt köşeye 5 kez hızlıca tıklayın.
            </p>
        </div>

        <!-- REKLAM KATMANI -->
        <div id="video-container">
            <video id="ad-video" muted playsinline></video>
        </div>

        <!-- NÖBETÇİ KATMANI -->
        <div id="duty-layer" class="p-12 space-y-12">
            <header class="text-center border-b-8 border-red-600 pb-12">
                <div id="clock" class="text-[12rem] font-black leading-none tabular-nums">00:00:00</div>
                <div id="date" class="text-4xl font-bold text-slate-400 mt-4 uppercase">-- --- ----</div>
            </header>
            
            <div class="bg-white/5 p-12 rounded-[50px] border border-white/10 text-center space-y-8">
                <div class="bg-red-600 inline-block px-12 py-3 rounded-full text-2xl font-black uppercase">Şu An Nöbetçi</div>
                <h2 id="ph-name" class="text-8xl font-black uppercase tracking-tighter text-white leading-none">--</h2>
                <div class="w-full h-1 bg-white/10"></div>
                <div class="flex items-center justify-center gap-6">
                    <p id="ph-phone" class="text-7xl font-black tracking-widest text-green-400">--</p>
                </div>
                <p id="ph-address" class="text-4xl text-slate-300 font-bold leading-tight">--</p>
            </div>

            <div class="flex-1 rounded-[50px] overflow-hidden border-4 border-slate-800 relative min-h-[600px]">
                <iframe id="map-iframe" width="100%" height="100%" frameborder="0" style="filter: invert(90%) hue-rotate(180deg);"></iframe>
            </div>

            <div class="flex justify-between items-center bg-white p-8 rounded-[40px]">
                <img id="qr-code" src="" class="w-48 h-48">
                <div class="text-right text-slate-900">
                    <p class="font-black text-3xl uppercase leading-none">Yol Tarifi</p>
                    <p class="font-bold text-xl opacity-60 uppercase mt-2">Telefondan Tara</p>
                </div>
            </div>
        </div>
    </div>

    <!-- GİZLİ AYARLAR TETİKLEYİCİ -->
    <div onclick="countClicks()" style="position:fixed; bottom:0; left:0; width:200px; height:200px; z-index:1000; cursor:pointer;"></div>

    <!-- AYARLAR MODALI -->
    <div id="settings-modal" class="fixed inset-0 bg-black/98 z-[2000] hidden p-20 overflow-y-auto">
        <div class="max-w-4xl mx-auto space-y-12">
            <h3 class="text-4xl font-black uppercase">Liste Güncelleme</h3>
            <textarea id="list-input" class="w-full h-64 bg-slate-900 border-2 border-slate-700 rounded-3xl p-8 font-mono text-xl outline-none text-blue-400"></textarea>
            <textarea id="video-input" class="w-full h-32 bg-slate-900 border-2 border-slate-700 rounded-3xl p-8 font-mono text-xl outline-none text-green-400" placeholder="Reklam Linkleri (MP4)"></textarea>
            <div class="flex gap-4">
                <button onclick="saveAndApply()" class="flex-1 bg-white text-black py-8 rounded-3xl font-black text-3xl">KAYDET</button>
                <button onclick="toggleSettings()" class="px-12 bg-slate-800 rounded-3xl font-bold uppercase">Kapat</button>
            </div>
        </div>
    </div>

    <script>
        let dutyRoster = [];
        let videoList = [];
        let currentVideoIndex = 0;
        let clickCounter = 0;
        let lastClickTime = 0;
        let systemPin = localStorage.getItem('niksar_pin_v10') || "5260"; // Varsayılan PIN: 5260

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('tr-TR', { hour12: false });
            document.getElementById('date').textContent = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', weekday: 'long' });
            if (now.getSeconds() === 0) checkMode();
        }

        function checkMode() {
            const now = new Date();
            const hour = now.getHours();
            const day = now.getDay();
            const isWeekend = (day === 0 || day === 6);
            const isAdTime = !isWeekend && (hour >= 8 && hour < 18);
            
            const vCont = document.getElementById('video-container');
            const dLayer = document.getElementById('duty-layer');
            const setupMsg = document.getElementById('setup-message');
            const video = document.getElementById('ad-video');

            if (dutyRoster.length === 0 && videoList.length === 0) {
                setupMsg.style.display = 'block';
                dLayer.style.opacity = '0';
                vCont.style.display = 'none';
                return;
            }

            setupMsg.style.display = 'none';

            if (isAdTime && videoList.length > 0) {
                vCont.style.display = 'block';
                dLayer.style.opacity = '0';
                if (video.paused || video.src === "") playNextVideo();
            } else {
                vCont.style.display = 'none';
                dLayer.style.opacity = '1';
                video.pause();
                updateDisplay();
            }
        }

        function playNextVideo() {
            if (videoList.length === 0) return;
            const v = document.getElementById('ad-video');
            v.src = videoList[currentVideoIndex];
            v.play().catch(() => setTimeout(skipVideo, 2000));
            v.onended = skipVideo;
        }

        function skipVideo() {
            currentVideoIndex = (currentVideoIndex + 1) % videoList.length;
            playNextVideo();
        }

        function updateDisplay() {
            const now = new Date();
            const hour = now.getHours();
            let t = new Date(now);
            if (hour < 8) t.setDate(now.getDate() - 1);
            const today = `${String(t.getDate()).padStart(2,'0')}.${String(t.getMonth()+1).padStart(2,'0')}.${t.getFullYear()}`;
            
            const d = dutyRoster.find(e => e.tarih === today);
            if (d) {
                document.getElementById('ph-name').textContent = d.isim;
                document.getElementById('ph-address').textContent = d.adres;
                document.getElementById('ph-phone').textContent = d.tel;
                const q = encodeURIComponent(`${d.isim} Eczanesi Niksar Tokat`);
                document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${q}&t=&z=16&ie=UTF8&iwloc=&output=embed`;
                document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent('https://www.google.com/maps/search/?api=1&query='+q)}`;
            }
        }

        function countClicks() {
            const n = Date.now();
            if (n - lastClickTime > 2000) clickCounter = 0;
            clickCounter++;
            lastClickTime = n;
            if (clickCounter >= 5) {
                const pin = prompt("GÜVENLİK PIN KODUNU GİRİN:");
                if (pin === systemPin) toggleSettings();
                clickCounter = 0;
            }
        }

        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }

        function saveAndApply() {
            const l = document.getElementById('list-input').value;
            const v = document.getElementById('video-input').value;
            localStorage.setItem('l_v10', l);
            localStorage.setItem('v_v10', v);
            process(l, v);
            checkMode();
            toggleSettings();
        }

        function process(lt, vt) {
            const r = /<([^>]+)>\s*<([^>]+)>\s*<([^>]+)>/g;
            dutyRoster = [];
            let m;
            while ((m = r.exec(lt)) !== null) {
                const p = m[2].trim().split(' . ');
                dutyRoster.push({ isim: m[1].trim(), adres: p[0], tel: p[1] || "", tarih: m[3].trim() });
            }
            videoList = vt.split('\n').filter(x => x.trim().startsWith('http'));
        }

        window.onload = () => {
            const sl = localStorage.getItem('l_v10');
            const sv = localStorage.getItem('v_v10');
            if (sl) {
                document.getElementById('list-input').value = sl;
                document.getElementById('video-input').value = sv || "";
                process(sl, sv || "");
            }
            setInterval(updateClock, 1000);
            updateClock();
            checkMode();
        };
    </script>
</body>
</html>
